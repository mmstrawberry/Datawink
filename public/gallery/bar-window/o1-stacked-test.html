<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stacked Bar Chart with Images</title>
  <style>
    /* Overall page style */
    body {
      margin: 0;
      padding: 0;
      background: #eee5d5;
      font-family: "Roboto Mono", monospace;
    }

    /* Container to keep the chart centered and responsive */
    .chart-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    /* Make our SVG responsive by using "width: 100%; height: auto;" */
    svg {
      width: 100%;
      height: auto;
      display: block;
      background: #eee5d5;
    }

    /* Basic text styles that match the original SVG's look */
    .chart-title {
      fill: #24DBE1;
      opacity: 0.7;
      font-size: 14px;
      text-anchor: start;
    }
    .chart-subtitle {
      fill: #24DBE1;
      opacity: 0.7;
      font-size: 12px;
      text-anchor: start;
    }
    .chart-source {
      fill: #24DBE1;
      opacity: 0.7;
      font-size: 12px;
      text-anchor: start;
    }

    .axis line,
    .axis path {
      stroke: #040723;
    }
    .axis text {
      fill: #040723;
      font-size: 12px;
    }

    /* Optional: a slight drop-in styling for the stacked bars */
    rect.layer {
      transition: 0.3s fill, 0.3s opacity;
    }
    rect.layer:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="chart-container">
  <!-- We’ll place our full SVG here, including the background images and D3-based stacked bars -->
  <svg id="stacked-bar-chart" viewBox="0 0 700 700">

    <!-- The "first" background image that was in the original (the pink city window) -->
    <image
      href="https://plotparade.com/55_window/img/ia2.jpg"
      width="100%"
      height="100%"
      x="0"
      y="0"
    ></image>

    <!-- Title and subtitle in the upper-left corner, matching original style -->
    <text x="160" y="40" class="chart-title">Untitled chart</text>
    <text x="160" y="60" class="chart-subtitle">(subtitle)</text>

    <!-- We'll reserve space for the bars in front of the image -->
    <!-- We'll add them via D3 inside a <g> after we load the script -->

    <!-- The "second" optional foreground image that can be clipped or just placed on top;
         for simplicity, we place it after the stacked bars, but you can adjust to replicate
         the exact original clip effect if desired. We’ll initially keep it hidden with
         style="display:none" in case you just want the background. -->
    <image
      id="foreground-img"
      href="https://plotparade.com/55_window/img/ia1.jpg"
      width="100%"
      height="100%"
      x="0"
      y="0"
      style="display: none"
    ></image>

    <!-- Optional data source text near the bottom -->
    <text id="source-text" x="40" y="680" class="chart-source">
      source: credit your data source
    </text>
  </svg>
</div>

<!-- Load D3 from a CDN -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
  // Our stacked bar dataset: 6 data points, each with 3 stacked categories.
  // Feel free to modify or add more entries to reflect actual data.
  const dataset = [
    { year: 2015, type1: 2, type2: 1, type3: 1 },
    { year: 2016, type1: 0, type2: 2, type3: 0 },
    { year: 2017, type1: 3, type2: 1, type3: 2 },
    { year: 2018, type1: 1, type2: 2, type3: 2 },
    { year: 2019, type1: 4, type2: 1, type3: 1 },
    { year: 2020, type1: 7, type2: 2, type3: 0 },
  ];

  // Keys for the 3 stacked series
  const keys = ["type1", "type2", "type3"];

  // Set up our base SVG and margin
  const svg = d3.select("#stacked-bar-chart");
  const width  = 700;
  const height = 700;
  const margin = { top: 100, right: 40, bottom: 70, left: 60 };
  const chartWidth = width - margin.left - margin.right;
  const chartHeight = height - margin.top - margin.bottom;

  // Create a group for the stacked bars
  const g = svg.append("g")
    .attr("id", "chart-layer")
    .attr("transform", `translate(${margin.left},${margin.top})`);

  // X scale: years from the dataset
  const x = d3.scaleBand()
    .domain(dataset.map(d => d.year))
    .range([0, chartWidth])
    .padding(0.2);

  // Y scale: from 0 up to the maximum sum
  const maxSum = d3.max(dataset, d => d.type1 + d.type2 + d.type3);
  const y = d3.scaleLinear()
    .domain([0, maxSum])
    .nice()
    .range([chartHeight, 0]);

  // Color scale for our 3 categories
  const color = d3.scaleOrdinal()
    .domain(keys)
    // Using the same color palette from the original code for demonstration
    .range(["#ee378c", "#FBBC3B", "#24DBE1"]);

  // Stack the data
  const stackedData = d3.stack()
    .keys(keys)(dataset);

  // Draw the stacked bars
  g.selectAll("g.layer")
    .data(stackedData)
    .join("g")
      .attr("class", "layer")
      .attr("fill", d => color(d.key))
    .selectAll("rect")
    .data(d => d)
    .join("rect")
      .attr("class", "layer")
      .attr("x", d => x(d.data.year))
      .attr("y", d => y(d[1]))
      .attr("height", d => y(d[0]) - y(d[1]))
      .attr("width", x.bandwidth());

  // Add the X axis at the bottom
  g.append("g")
    .attr("class", "axis")
    .attr("transform", `translate(0,${chartHeight})`)
    .call(d3.axisBottom(x).tickFormat(d3.format("d")));

  // Add the Y axis on the left
  g.append("g")
    .attr("class", "axis")
    .call(d3.axisLeft(y));

  // If you’d like to show the second image on top with a partial clip, remove "display:none"
  // from the image in the SVG above or dynamically set it here:
  // d3.select("#foreground-img").style("display", "block");

  // Example: if you want to replicate the original "clipping" style, you'd create a clipPath
  // for the bars or for the image. However, the simplest approach is to just show/hide or
  // transform the second image as needed.
  
  /*
  // Example of how to reveal the second image:
  d3.select("#foreground-img")
    .transition()
    .duration(1500)
    .style("display", "block");
  */

      .attr("fill", "#040723")
      .style("font-size", "12px");
  });
  */
</script>

</body>
</html>
