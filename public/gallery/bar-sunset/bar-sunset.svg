<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800%" height="80%" viewBox="0 0 700 700" style="font-family: 'Roboto Mono';">
    <style>
        .bar-label {
            font-size: 12px;
            fill: #222;
            text-anchor: middle;
        }
        .bar-shadow {
            opacity: 0.8;
        }
    </style>
    <defs>
        <mask id="wink-mask">
            <rect width="100%" height="100%" x="0" y="0" style="fill: white; opacity: 1;"></rect>
            <rect width="540" height="540" x="0" y="0" fill="black" transform="translate(80,80)"></rect>
        </mask>
    </defs>

    <defs>
        <linearGradient id="wink-gradient_classA" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgb(0% 0% 0%)" stop-opacity="0"></stop>
            <stop offset="100%" stop-color="rgb(0% 0% 0%)" stop-opacity="1"></stop>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" x="0" y="0" fill="#eee5d5"></rect>


    <rect width="540" height="266" x="0" y="0" fill="#9cbdb5" transform="translate(80,80)"></rect>


    <rect width="540" height="270" x="0" y="270" fill="#e63313" transform="translate(80,80)"></rect>


    <circle cx="80" cy="110" r="16" fill="#eee5d5" transform="translate(80,80)"></circle>


    <g id="wink-bar-group" transform="translate(80,80)">
        <g class="year-group" transform="translate(120,0)">
            <g class="sub-bar" transform="translate(2.5,0)">
                <rect class="bar-rect" x="0" y="235.71428571428572" width="45" height="34.28571428571428" fill="black">
                </rect><text class="bar-label" x="22.5" y="235.71428571428572" dy="-4">2</text>
                <polygon class="bar-shadow" points="0,0 45,0 79.28571428571428,34.28571428571428 34.28571428571428,34.28571428571428" fill="url(#wink-gradient_classA)" transform="translate(0,270)"></polygon>
            </g>
        </g>
        <g class="year-group" transform="translate(195,0)">
            <g class="sub-bar" transform="translate(2.5,0)">
                <rect class="bar-rect" x="0" y="184.28571428571428" width="45" height="85.71428571428572" fill="black">
                </rect><text class="bar-label" x="22.5" y="184.28571428571428" dy="-4">5</text>
                <polygon class="bar-shadow" points="0,0 45,0 130.71428571428572,85.71428571428572 85.71428571428572,85.71428571428572" fill="url(#wink-gradient_classA)" transform="translate(0,270)"></polygon>
            </g>
        </g>
        <g class="year-group" transform="translate(270,0)">
            <g class="sub-bar" transform="translate(2.5,0)">
                <rect class="bar-rect" x="0" y="201.42857142857144" width="45" height="68.57142857142856" fill="black">
                </rect><text class="bar-label" x="22.5" y="201.42857142857144" dy="-4">4</text>
                <polygon class="bar-shadow" points="0,0 45,0 113.57142857142856,68.57142857142856 68.57142857142856,68.57142857142856" fill="url(#wink-gradient_classA)" transform="translate(0,270)"></polygon>
            </g>
        </g>
        <g class="year-group" transform="translate(345,0)">
            <g class="sub-bar" transform="translate(2.5,0)">
                <rect class="bar-rect" x="0" y="235.71428571428572" width="45" height="34.28571428571428" fill="black">
                </rect><text class="bar-label" x="22.5" y="235.71428571428572" dy="-4">2</text>
                <polygon class="bar-shadow" points="0,0 45,0 79.28571428571428,34.28571428571428 34.28571428571428,34.28571428571428" fill="url(#wink-gradient_classA)" transform="translate(0,270)"></polygon>
            </g>
        </g>
        <g class="year-group" transform="translate(420,0)">
            <g class="sub-bar" transform="translate(2.5,0)">
                <rect class="bar-rect" x="0" y="150" width="45" height="120" fill="black"></rect><text class="bar-label" x="22.5" y="150" dy="-4" text-anchor="middle" font-size="12" fill="#222">7</text>
                <polygon class="bar-shadow" points="0,0 45,0 165,120 120,120" fill="url(#wink-gradient_classA)" opacity="0.8" transform="translate(0,270)"></polygon>
            </g>
        </g><text class="year-label-start" x="100" y="260" font-size="12" fill="#222" text-anchor="end">2006</text><text class="year-label-end" x="482" y="260" font-size="12" fill="#222" text-anchor="start">2010</text>
    </g>


    <g transform="translate(0,0)">
        <rect width="100%" height="100%" x="0" y="0" mask="url(#wink-mask)" fill="#eee5d5"></rect>
    </g>


    <text x="350" y="40" font-size="12" fill="#333" class="title" style="text-anchor: middle;">
        Untitled chart
    </text>
    <text x="350" y="55" font-size="12" fill="#333" class="unit" style="text-anchor: middle;">
        (your unit here)
    </text>


    <text x="80" y="640" font-size="12" fill="#333" class="datasrc datasrcStyle" style="text-anchor: start;">
        Credit your data source
    </text>
</svg>